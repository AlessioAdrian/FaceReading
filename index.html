<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Facial Universitário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://unpkg.com/@vladmandic/face-api/dist/face-api.js"></script>
    <script defer src="app.js"></script>
</head>
<body>
    <header>
        <h1>CampusID <span>• Reconhecimento Facial</span></h1>
        <button id="installBtn" style="display: none;">Instalar App</button>
    </header>

    <main class="container">
        <section class="camera-section">
            <h2>Monitoramento em Tempo Real</h2>
            <div class="video-container">
                <video id="video" autoplay muted width="640" height="480"></video>
                <canvas id="overlay"></canvas>
            </div>
            <div id="status" class="status-loading">Carregando Modelos de IA...</div>
        </section>

        <section class="report-section">
            <h2>Relatório de Circulação</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Função</th>
                            <th>Horário</th>
                        </tr>
                    </thead>
                    <tbody id="report-body">
                        </tbody>
                </table>
            </div>
            <button id="clearLog">Limpar Relatório</button>
        </section>
    </main>
</body>
</html>
